name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 1. Preparar Python 3.9
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 2. Instalar dependencias del sistema
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev
          sudo apt-get install -y zlib1g-dev openjdk-17-jdk unzip autoconf libtool pkg-config

      # 3. Instalar Buildozer
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 4. Configurar versión ESTABLE de Android (para evitar la versión Preview/Baklava)
      - name: Configure Buildozer Spec
        run: |
          # Si no existe el spec, creamos uno nuevo
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          
          # Forzamos API 33 (Estable) y Java 11
          sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          
          # Desactivamos actualizaciones automáticas del SDK para que no busque versiones beta
          sed -i 's/# android.sdk_build_tools_version = .*/android.sdk_build_tools_version = 33.0.0/' buildozer.spec

      # 5. EL HACK: Crear licencias manualmente antes de empezar
      - name: Pre-Accept Android Licenses
        run: |
          # Crear la carpeta donde Buildozer buscará las licencias
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # Escribir los códigos secretos de aceptación de Google
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Aceptar también la licencia Preview por si acaso insiste en descargarla
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      # 6. Compilar (Ahora sí debería pasar sin preguntar)
      - name: Build with Buildozer
        run: |
          yes | buildozer android debug

      # 7. Subir el APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
