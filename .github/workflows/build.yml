name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Configurar Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2️⃣ Instalar dependencias del sistema
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev
          sudo apt-get install -y zlib1g-dev unzip autoconf libtool pkg-config wget curl
          sudo apt-get install -y openjdk-17-jdk

      # 3️⃣ Instalar Buildozer y dependencias Python
      - name: Install Buildozer and Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython pyjnius==1.5.0 kivy==2.2.1

      # 4️⃣ Configurar Android NDK y SDK
      - name: Setup Android SDK and NDK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-25b
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          echo "Descargando Android Command Line Tools..."
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm commandlinetools-linux-9477386_latest.zip
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          echo "Instalando componentes de Android SDK..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653" 2>&1 | tail -20
          echo "✅ Android SDK configurado"

      # 5️⃣ Configurar buildozer.spec
      - name: Configure Buildozer Spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3==3.10.11,kivy==2.2.1,pillow,pyjnius==1.5.0/' buildozer.spec
          echo "✅ buildozer.spec configurado"

      # 6️⃣ Limpiar builds previos
      - name: Clean previous builds
        run: |
          rm -rf .buildozer/build/ || true
          rm -rf .buildozer/applibs/ || true
          rm -rf bin/ || true
          echo "✅ Directorios limpios"

      # 7️⃣ Compilar APK
      - name: Build with Buildozer
        env:
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-25b
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          PATH: /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:/home/runner/.buildozer/android/platform/android-ndk-25b:$PATH
        run: |
          set -e
          echo "Iniciando compilación..."
          buildozer android debug

      # 8️⃣ Verificar APK
      - name: Verify APK
        run: |
          if [ -f bin/ganaderiapr-1.0-debug.apk ]; then
            echo "✅ APK creado exitosamente"
            ls -lh bin/*.apk
          else
            echo "❌ APK no encontrado"
            exit 1
          fi

      # 9️⃣ Subir APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ganaderiapr-apk
          path: bin/ganaderiapr-*.apk
          retention-days: 7
