name: 🐄 RanchoPRO — Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Descargar codigo
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (CRÍTICO)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🛠️ Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y -f libunwind-dev
          sudo apt-get install -y \
            build-essential git ffmpeg libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libffi-dev libssl-dev python3-setuptools \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libgdbm-dev libnss3-dev \
            libsqlite3-dev libreadline-dev tk-dev libbz2-dev \
            liblzma-dev libopenjp2-7-dev libtiff5-dev \
            libjpeg-dev libfreetype6-dev liblcms2-dev \
            libwebp-dev tcl8.6-dev tk8.6-dev libharfbuzz-dev \
            libfribidi-dev libxcb1-dev

      - name: 📦 Instalar Buildozer y Cython estable
        run: |
          pip install --upgrade pip
          pip install --upgrade "Cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🚀 COMPILAR APK
        run: |
          # Eliminar compilaciones rotas anteriores
          rm -rf .buildozer/
          
          # Crear carpeta bin por si acaso
          mkdir -p bin
          
          # EJECUCIÓN: Aceptamos licencias y compilamos
          # Usamos la ruta directa de Java 17 para que Gradle no se confunda
          export JAVA_HOME=$JAVA_HOME_17_X64
          yes | buildozer -v android debug
        continue-on-error: false

      - name: 📤 Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: RanchoPRO-Android-v3
          path: bin/*.apk
          if-no-files-found: error
