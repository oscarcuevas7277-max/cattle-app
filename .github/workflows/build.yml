name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev
          sudo apt-get install -y zlib1g-dev unzip autoconf libtool pkg-config wget curl ant openjdk-17-jdk

      - name: Setup Android SDK and NDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          
          ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b
          
          # Download and setup SDK
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d /tmp/
          mv /tmp/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm /tmp/sdk.zip
          
          # Create licenses
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # Create symlink
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          
          # Install SDK components
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33" "build-tools;33.0.2" > /dev/null 2>&1 || true
          
          # Download NDK
          mkdir -p $NDK_HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp/
          mv /tmp/android-ndk-r25b/* $NDK_HOME/
          rm -rf /tmp/android-ndk-r25b /tmp/ndk.zip

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-r25b
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          PATH: /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:/home/runner/.buildozer/android/platform/android-ndk-r25b:/home/runner/.buildozer/android/platform/android-sdk/build-tools/33.0.2:$PATH
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ganaderiapr-apk
          path: bin/*.apk
